{{ define "main" }}
<section class="content-shell">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}
    <div class="content-body">{{ . }}</div>
  {{ end }}
  {{ if .Pages }}
    <div class="card-grid">
      {{ range .Pages }}
        <article class="card">
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          {{ with .Summary }}<p>{{ . }}</p>{{ end }}
        </article>
      {{ end }}
    </div>
  {{ end }}
</section>
{{ end }}
